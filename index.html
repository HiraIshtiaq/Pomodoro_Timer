<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOCUS — Pomodoro Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>
 
  <main class="app" id="app">
    <header class="header">
      <div class="logo">FOCUS</div>
      <button class="settings-btn" id="settingsToggle" aria-label="Open settings" aria-expanded="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>
 
    <div class="settings-panel" id="settingsPanel" role="dialog" aria-modal="true" aria-label="Timer settings" hidden>
      <div class="settings-inner">
        <h2 class="settings-title">Settings</h2>
        <div class="settings-row">
          <label class="settings-label" for="focusInput">Focus duration</label>
          <div class="input-group">
            <input type="number" id="focusInput" class="time-input" min="1" max="99" value="25" aria-label="Focus duration in minutes" />
            <span class="input-unit">min</span>
          </div>
        </div>
        <div class="settings-row">
          <label class="settings-label" for="breakInput">Break duration</label>
          <div class="input-group">
            <input type="number" id="breakInput" class="time-input" min="1" max="99" value="5" aria-label="Break duration in minutes" />
            <span class="input-unit">min</span>
          </div>
        </div>
        <button class="apply-btn" id="applySettings">Apply</button>
      </div>
    </div>
 
    <section class="timer-section" aria-label="Timer">
      <div class="mode-badge" id="modeBadge" aria-live="polite">FOCUS</div>
 

      <div class="ring-wrapper" role="timer" aria-live="off">
        <svg class="ring-svg" viewBox="0 0 300 300" aria-hidden="true">
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <circle class="ring-track" cx="150" cy="150" r="130" />

          <circle class="ring-progress" id="ringProgress" cx="150" cy="150" r="130"
            stroke-dasharray="816.81"
            stroke-dashoffset="0"
            filter="url(#glow)"
          />
          <g class="tick-marks" id="tickMarks"></g>
        </svg>
 
        <div class="timer-face">
          <div class="time-display" id="timeDisplay" aria-label="Time remaining">25:00</div>
          <div class="session-count" id="sessionCount" aria-label="Sessions completed today">
            <span id="sessionNum">0</span> sessions today
          </div>
        </div>
      </div>
 
      <!-- Controls -->
      <div class="controls" role="group" aria-label="Timer controls">
        <button class="ctrl-btn ctrl-reset" id="resetBtn" aria-label="Reset timer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
          </svg>
        </button>
 
        <button class="ctrl-btn ctrl-primary" id="startBtn" aria-label="Start timer">
          <svg class="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
          <svg class="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
 
        <button class="ctrl-btn ctrl-skip" id="skipBtn" aria-label="Skip to next session">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5,4 15,12 5,20" fill="currentColor" stroke="none"/>
            <line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
      </div>
    </section>
 
    <section class="history-section" aria-label="Today's completed sessions">
      <div class="history-header">
        <span class="history-title">TODAY</span>
        <span class="history-date" id="historyDate"></span>
      </div>
      <div class="history-list" id="historyList" role="list" aria-label="Completed focus sessions">
        <div class="history-empty" id="historyEmpty">No sessions completed yet — start focusing.</div>
      </div>
    </section>
  </main>
 
  <div class="complete-overlay" id="completeOverlay" aria-hidden="true">
    <div class="complete-inner">
      <div class="complete-icon">✓</div>
      <div class="complete-text" id="completeText">Focus session complete</div>
    </div>
  </div>
 
  <script src="app.js"></script>
</body>
</html>
